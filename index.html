function numToKorean(n) {
  if(!n||n===0) return '영원정';
  const d=['','일','이','삼','사','오','육','칠','팔','구'];
  const u=['','십','백','천'];
  const chunk = v => { let s=''; for(let i=3;i>=0;i--){ const x=Math.floor(v/10**i)%10; if(x) s+=(x===1&&i>0?'':d[x])+u[i]; } return s; };
  let r='';
  const eok=Math.floor(n/100000000), man=Math.floor((n%100000000)/10000), rest=n%10000;
  if(eok) r+=chunk(eok)+'억';
  if(man) r+=chunk(man)+'만';
  if(rest) r+=chunk(rest);
  return r+'원정';
}

              style={{width:'100%',padding:'10px 12px',border:'1px solid #e0e0e0',borderRadius:6,fontSize:13,outline:'none'}}
              onFocus={e=>e.target.style.borderColor='#111'} onBlur={e=>e.target.style.borderColor='#e0e0e0'}/>

            <label style={{display:'block',fontSize:11,fontWeight:600,color:'#666',marginBottom:5}}>비밀번호</label>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="비밀번호 입력"
              style={{width:'100%',padding:'10px 12px',border:'1px solid #e0e0e0',borderRadius:6,fontSize:13,outline:'none'}}
              onFocus={e=>e.target.style.borderColor='#111'} onBlur={e=>e.target.style.borderColor='#e0e0e0'}/>
          </div>
          {err&&<div style={{fontSize:12,color:'#e53e3e',marginBottom:14,background:'#fff5f5',border:'1px solid #fed7d7',borderRadius:6,padding:'8px 12px'}}>{err}</div>}
          <button type="submit" disabled={loading}
            style={{width:'100%',padding:'11px',background:'#111',color:'#fff',border:'none',borderRadius:6,fontSize:14,fontWeight:600,cursor:loading?'wait':'pointer'}}>
            {loading?'로그인 중...':'로그인'}

  );
}

/* ══════════════════════════════════════
   PDF 저장 유틸 (html2canvas + jsPDF)
══════════════════════════════════════ */
async function savePDF(quoteId, projectTitle) {
  const { jsPDF } = window.jspdf;
  const pages = document.querySelectorAll('.cover-page, .detail-page');
  if (!pages.length) { alert('저장할 페이지를 찾을 수 없습니다.'); return; }
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  for (let i = 0; i < pages.length; i++) {
    if (i > 0) doc.addPage();
    const canvas = await html2canvas(pages[i], {
      scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false,
    });
    doc.addImage(canvas.toDataURL('image/jpeg', 0.98), 'JPEG', 0, 0, 297, 210);
  }
  doc.save(`${projectTitle||quoteId||'견적서'}_견적서.pdf`);
}

/* ══════════════════════════════════════
   APP ROOT
══════════════════════════════════════ */
function App() {
  const[ready,setReady]=useState(false);
  const[authReady,setAuthReady]=useState(false);
  const[user,setUser]=useState(null);

  useEffect(()=>{
    let t;
    const check=()=>{ if(window.db&&window.fb&&window.fbAuth){setReady(true);} else t=setTimeout(check,50); };
    check(); return()=>clearTimeout(t);
  },[]);

  useEffect(()=>{
    if(!ready)return;
    const unsub=window.fbAuth.onAuthStateChanged(u=>{setUser(u);setAuthReady(true);});
    return unsub;
  },[ready]);

  if(!ready||!authReady)return<LoadingScreen/>;
  if(READONLY_ID)return<ReadOnlyApp quoteId={READONLY_ID} token={READONLY_TOKEN}/>;
  if(!user)return<LoginScreen/>;
  return<ManagementApp user={user}/>;
}

/* ══════════════════════════════════════
   READ-ONLY APP  (공유 링크 전용)
══════════════════════════════════════ */
function ReadOnlyApp({ quoteId, token }) {
  const [quote,      setQuote]      = useState(null);
  const [company,    setCompany]    = useState(DEFAULT_COMPANY);
  const [error,      setError]      = useState(null);
  const [pdfLoading, setPdfLoading] = useState(false);

  useEffect(() => {
    const { db, fb } = window;
    (async () => {
      try {
        const qSnap = await fb.getDoc(fb.doc(db, 'quotes', quoteId));
        if (!qSnap.exists()) { setError('견적서를 찾을 수 없습니다.'); return; }
        const q = qSnap.data();
        if (!q.shareToken || q.shareToken !== token) { setError('유효하지 않은 공유 링크입니다.'); return; }
        setQuote(q);
        const cSnap = await fb.getDoc(fb.doc(db, 'settings', 'company'));
        if (cSnap.exists()) setCompany(cSnap.data());
      } catch(e) { setError('불러오기 실패: ' + e.message); }
    })();
  }, [quoteId, token]);

  if (error) return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',gap:12}}>
      <div style={{fontSize:48}}>⚠️</div>
      <div style={{fontSize:16,fontWeight:600,color:'#333'}}>{error}</div>
      <div style={{fontSize:13,color:'#aaa'}}>올바른 링크인지 확인해 주세요.</div>
    </div>
  );
  if (!quote) return <LoadingScreen />;

  return (
    <div className="ro-outer" style={{background:'#f4f5f7',minHeight:'100vh',padding:'24px'}}>
      <div className="ro-inner" style={{maxWidth:960,margin:'0 auto'}}>
        <div className="no-print" style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18,background:'#fff',borderRadius:8,padding:'14px 20px',border:'1px solid #e8e8e8'}}>
          <div>
            <div className="logo-font" style={{fontSize:18,fontWeight:600,color:'#111'}}>DAWON</div>
            <div style={{fontSize:11,color:'#aaa',marginTop:2}}>견적서 열람 전용 · 수정 불가</div>
          </div>
          <button
            disabled={pdfLoading}
            onClick={async()=>{setPdfLoading(true);await savePDF(quote.id,quote.projectTitle);setPdfLoading(false);}}
            style={{padding:'9px 22px',background:'#111',color:'#fff',border:'none',borderRadius:6,fontSize:13,fontWeight:600,cursor:pdfLoading?'wait':'pointer'}}>
            {pdfLoading?'⏳ 생성 중...':'📄 PDF 저장 (A4)'}
          </button>
        </div>
        <QuoteDocument quote={quote} company={company} />
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   MANAGEMENT APP
══════════════════════════════════════ */
function ManagementApp({user}){
  const[quotes,setQuotes]=useState([]);
  const[company,setCompany]=useState(DEFAULT_COMPANY);
  const[page,setPage]=useState('dashboard');
  const[selectedId,setSelectedId]=useState(null);
  const[sideOpen,setSideOpen]=useState(window.innerWidth>768);
  const[showSettings,setShowSettings]=useState(false);
  const[memberRole,setMemberRole]=useState('editor');

  /* 멤버 역할 로드 */
  useEffect(()=>{
    if(!user)return;
    const{db,fb}=window;
    (async()=>{
      try{
        const snap=await fb.getDoc(fb.doc(db,'members',user.uid));
        if(snap.exists()){setMemberRole(snap.data().role||'editor');}
        else{
          const all=await fb.getDocs(fb.collection(db,'members'));
          const role=all.empty?'admin':'editor';
          await fb.setDoc(fb.doc(db,'members',user.uid),{uid:user.uid,email:user.email,role,name:user.displayName||user.email,createdAt:nowIso()});
          setMemberRole(role);
        }
      }catch(e){}
    })();
  },[user]);

  const isAdmin=memberRole==='admin';
  const canEdit=memberRole==='admin'||memberRole==='editor';

  /* 회사 설정 로드 */
  useEffect(()=>{
    const{db,fb}=window;
    (async()=>{try{const s=await fb.getDoc(fb.doc(db,'settings','company'));if(s.exists())setCompany(s.data());}catch(e){}})();
  },[]);

  /* 견적서 실시간 동기화 */
  useEffect(()=>{
    const{db,fb}=window;
    const unsub=fb.onSnapshot(fb.collection(db,'quotes'),snap=>{
      const qs=snap.docs.map(d=>d.data());
      setQuotes(qs.sort((a,b)=>b.id.localeCompare(a.id)));
    });
    return()=>unsub();
  },[]);

  /* 화면 크기 변경 시 사이드바 자동 제어 */
  useEffect(()=>{
    const fn=()=>setSideOpen(window.innerWidth>768);
    window.addEventListener('resize',fn);
    return()=>window.removeEventListener('resize',fn);
  },[]);

  const selected=quotes.find(q=>q.id===selectedId)||null;
  const navTo=p=>{setPage(p);setSelectedId(null);if(window.innerWidth<=768)setSideOpen(false);};

  const saveCompany=async c=>{
    const{db,fb}=window; setCompany(c);
    try{await fb.setDoc(fb.doc(db,'settings','company'),c);}catch(e){}
    setShowSettings(false);
  };

  const saveQuote=async q=>{
    const{db,fb}=window;
    try{await fb.setDoc(fb.doc(db,'quotes',q.id),q);}
    catch(e){alert('저장 실패: '+e.message);return;}
    setSelectedId(q.id); setPage('detail');
  };

  const deleteQuote=async id=>{
    if(!isAdmin){alert('관리자만 삭제할 수 있습니다');return;}
    if(!confirm('삭제하시겠습니까?'))return;
    const{db,fb}=window;
    try{await fb.deleteDoc(fb.doc(db,'quotes',id));}catch(e){alert('삭제 실패: '+e.message);return;}
    setSelectedId(null); setPage('dashboard');
  };

  const updateStatus=async(id,status)=>{
    if(!canEdit)return;
    const q=quotes.find(x=>x.id===id); if(!q)return;
    const entry={at:nowIso(),action:`상태 변경: ${STATUS_MAP[status].label}`};
    const updated={...q,status,history:[...(q.history||[]),entry]};
    const{db,fb}=window;
    try{await fb.setDoc(fb.doc(db,'quotes',id),updated);}catch(e){}
  };

  const generateShareLink=async quote=>{
    const token=genToken();
    const entry={at:nowIso(),action:'공유 링크 생성'};
    const updated={...quote,shareToken:token,history:[...(quote.history||[]),entry]};
    const{db,fb}=window;
    try{await fb.setDoc(fb.doc(db,'quotes',quote.id),updated);}
    catch(e){alert('링크 생성 실패: '+e.message);return null;}
    return token;
  };

  const ROLE_BADGE={admin:{bg:'#111',label:'관리자'},editor:{bg:'#2d6a4f',label:'편집자'},viewer:{bg:'#555',label:'열람자'}};
  const rb=ROLE_BADGE[memberRole]||ROLE_BADGE.viewer;

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      {sideOpen&&<div className="sidebar-backdrop no-print" onClick={()=>setSideOpen(false)}/>}
      <Sidebar open={sideOpen} page={page} setPage={navTo} quotes={quotes} company={company}
        openSettings={()=>setShowSettings(true)} onLogout={()=>window.fbAuth.signOut()}
        memberRole={memberRole} userEmail={user?.email} canEdit={canEdit}/>
      <div className="main-wrap" style={{flex:1,marginLeft:sideOpen?250:0,transition:'margin .25s',minWidth:0}}>
        <header className="topbar no-print" style={{height:58,background:'#fff',borderBottom:'1px solid #e8e8e8',display:'flex',alignItems:'center',padding:'0 24px',gap:10,position:'sticky',top:0,zIndex:50}}>
          <button onClick={()=>setSideOpen(!sideOpen)} style={{border:'none',background:'none',fontSize:20,color:'#555',lineHeight:1,padding:4,flexShrink:0}}>☰</button>
          <span style={{fontSize:15,fontWeight:600,color:'#111',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {{dashboard:'대시보드',list:'견적 목록',new:'새 견적서 작성',edit:'견적서 수정',detail:'견적서 상세'}[page]}
          </span>
          <span style={{fontSize:11,background:rb.bg,color:'#fff',borderRadius:4,padding:'2px 8px',fontWeight:600,flexShrink:0}}>{rb.label}</span>
          <span style={{fontSize:12,color:'#bbb',flexShrink:0,display:'none'}} className="col-hide-mobile">{new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'})}</span>
        </header>
        <main style={{padding:'24px 28px'}}>
          {page==='dashboard'&&<Dashboard quotes={quotes} setPage={setPage} setSelectedId={setSelectedId}/>}
          {page==='list'&&<QuoteList quotes={quotes} setPage={setPage} setSelectedId={setSelectedId}
            deleteQuote={deleteQuote} updateStatus={updateStatus} isAdmin={isAdmin} canEdit={canEdit}/>}
          {(page==='new'||page==='edit')&&canEdit&&
            <QuoteForm initial={page==='edit'?selected:null} onSave={saveQuote} setPage={setPage}/>}
          {(page==='new'||page==='edit')&&!canEdit&&
            <div style={{textAlign:'center',padding:60,color:'#aaa',fontSize:14}}>편집 권한이 없습니다.</div>}
          {page==='detail'&&selected&&
            <QuoteDetail quote={selected} company={company} setPage={setPage}
              deleteQuote={deleteQuote} updateStatus={updateStatus} generateShareLink={generateShareLink}
              isAdmin={isAdmin} canEdit={canEdit}/>}
        </main>
      </div>
      {showSettings&&<SettingsModal company={company} onSave={saveCompany} onClose={()=>setShowSettings(false)} isAdmin={isAdmin} currentUser={user}/>}
    </div>
  );
}

        <button onClick={onLogout} style={{width:'100%',padding:'10px 16px 14px',border:'none',background:'none',textAlign:'left',fontSize:13,color:'#aaa',display:'flex',alignItems:'center',gap:8}}>🚪 로그아웃</button>
      </div>

  );
}

  const sc       = k => quotes.filter(q=>q.status===k).length;

/* ══════════════════════════════════════
   QUOTE LIST
══════════════════════════════════════ */
function QuoteList({quotes,setPage,setSelectedId,deleteQuote,updateStatus,isAdmin,canEdit}){
  const [srch, setSrch]=useState('');
  const [sf,   setSf]  =useState('all');
  const [sort, setSort]=useState('date_desc');
  let list=[...quotes];
  if(srch) list=list.filter(q=>q.client.company.includes(srch)||q.id.includes(srch)||(q.projectTitle||'').includes(srch));
  if(sf!=='all') list=list.filter(q=>q.status===sf);
  list.sort((a,b)=>{
    if(sort==='date_desc') return b.id.localeCompare(a.id);
    if(sort==='date_asc')  return a.id.localeCompare(b.id);
    const ta=calcTotal(a.items),tb=calcTotal(b.items);
    return sort==='amt_desc'?tb-ta:ta-tb;
  });
  return (
    <div>
      <div className="no-print" style={{background:'#fff',borderRadius:8,padding:'14px 16px',marginBottom:14,border:'1px solid #e8e8e8',display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
        <input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="업체명, 견적번호, 프로젝트명 검색..."
          style={{flex:1,minWidth:180,padding:'8px 11px',border:'1px solid #e0e0e0',borderRadius:6,fontSize:13,outline:'none'}}/>
        <select value={sf} onChange={e=>setSf(e.target.value)} style={{padding:'8px 11px',border:'1px solid #e0e0e0',borderRadius:6,fontSize:13,background:'#fff',outline:'none'}}>
          <option value="all">전체 상태</option>
          {Object.entries(STATUS_MAP).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
        </select>
        <select value={sort} onChange={e=>setSort(e.target.value)} style={{padding:'8px 11px',border:'1px solid #e0e0e0',borderRadius:6,fontSize:13,background:'#fff',outline:'none'}}>
          <option value="date_desc">최신순</option>
          <option value="date_asc">오래된순</option>
          <option value="amt_desc">금액 높은순</option>
          <option value="amt_asc">금액 낮은순</option>
        </select>
        {canEdit&&<button onClick={()=>setPage('new')} style={{padding:'8px 18px',background:'#111',color:'#fff',border:'none',borderRadius:6,fontSize:13,fontWeight:600,whiteSpace:'nowrap'}}>+ 새 견적서</button>}
      </div>
      <div style={{background:'#fff',borderRadius:8,border:'1px solid #e8e8e8',overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#fafafa',borderBottom:'1px solid #e8e8e8'}}>
              {['견적번호','프로젝트명 / 업체','항목','총 제작비용','발행일','상태',''].map(h=>(
                <th key={h} style={{padding:'11px 14px',fontSize:11,fontWeight:600,color:'#888',textAlign:'left',whiteSpace:'nowrap'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {list.map(q=>{
              const s=STATUS_MAP[q.status]; const t=calcTotal(q.items);
              const cats=[...new Set(q.items.map(i=>i.category))];
              return (
                <tr key={q.id} onClick={()=>{setSelectedId(q.id);setPage('detail');}}
                  style={{borderBottom:'1px solid #f5f5f5',cursor:'pointer'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#fafafa'}
                  onMouseLeave={e=>e.currentTarget.style.background=''}>
                  <td style={{padding:'12px 14px',fontSize:12,fontWeight:600,color:'#555',whiteSpace:'nowrap'}}>{q.id}</td>
                  <td style={{padding:'12px 14px'}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#111',marginBottom:2}}>{q.projectTitle||'—'}</div>
                    <div style={{fontSize:11,color:'#bbb'}}>{q.client.company}</div>
                  </td>
                  <td style={{padding:'12px 14px'}}>
                    <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                      {cats.map(c=><span key={c} style={{fontSize:10,background:'#f0f0f0',color:'#555',borderRadius:3,padding:'2px 6px',fontWeight:600}}>{c}</span>)}
                    </div>
                  </td>
                  <td style={{padding:'12px 14px',fontSize:14,fontWeight:600,color:'#111',whiteSpace:'nowrap'}}>{fmtMoney(t)}원</td>
                  <td style={{padding:'12px 14px',fontSize:12,color:'#aaa',whiteSpace:'nowrap'}}>{fmtDate(q.createdAt)}</td>
                  <td style={{padding:'12px 14px'}}>
                    <span style={{fontSize:11,background:s.bg,color:s.color,borderRadius:4,padding:'3px 9px',fontWeight:600}}>{s.label}</span>
                  </td>
                  <td style={{padding:'12px 10px'}} onClick={e=>e.stopPropagation()}>
                    {isAdmin&&<button onClick={()=>deleteQuote(q.id)}
                      style={{border:'none',background:'none',color:'#ddd',fontSize:15,cursor:'pointer',padding:3,lineHeight:1}}
                      onMouseEnter={e=>e.target.style.color='#e53e3e'}
                      onMouseLeave={e=>e.target.style.color='#ddd'}>✕</button>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {!list.length&&(
          <div style={{padding:40,textAlign:'center',color:'#ccc',fontSize:13}}>
            {srch||sf!=='all'?'검색 결과가 없습니다':'견적서가 없습니다. 새 견적서를 작성해보세요!'}
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   입력 필드 컴포넌트
   ※ QuoteForm 외부에 정의해야 렌더링 시 재마운트 방지 (input 포커스 유지)
══════════════════════════════════════ */
function InpField({lbl,val,onChange,ph,err,required}) {
  return (
    <div>
      <label style={{display:'block',fontSize:11,fontWeight:600,color:'#666',marginBottom:5}}>
        {lbl}{required&&<span style={{color:'#e53e3e'}}> *</span>}
      </label>
      <input value={val} onChange={e=>onChange(e.target.value)} placeholder={ph}
        style={{width:'100%',padding:'9px 11px',border:`1px solid ${err?'#e53e3e':'#e0e0e0'}`,borderRadius:6,fontSize:13,outline:'none'}}
        onFocus={e=>e.target.style.borderColor='#111'}
        onBlur={e=>e.target.style.borderColor=err?'#e53e3e':'#e0e0e0'}/>
      {err&&<div style={{fontSize:11,color:'#e53e3e',marginTop:3}}>{err}</div>}
    </div>
  );
}

/* ══════════════════════════════════════
   QUOTE FORM  (3-step)
══════════════════════════════════════ */
function QuoteForm({initial, onSave, setPage}) {
  const isEdit = !!initial;
  const [step,       setStep]      = useState(1);
  const [proj,       setProj]      = useState(initial?.projectTitle||'');
  const [client,     setClient]    = useState(initial?.client||{company:'',contact:'',email:'',phone:''});
  const [validDays,  setValidDays] = useState(15);
  const [items,      setItems]     = useState(initial?.items||[]);
  const [vatExcluded,setVat]       = useState(initial?.vatExcluded??true);
  const [truncUnit,  setTruncUnit] = useState(initial?.truncUnit??0);
  const [notes,      setNotes]     = useState(initial?.notes?.join('\n')||'');
  const [mpDesc,     setMpDesc]    = useState(initial?.manpower?.desc||'');
  const [mpMembers,  setMpMembers] = useState(initial?.manpower?.members||[{exp:'',role:''}]);
  const [errs,       setErrs]      = useState({});

  const addItem   = (cat,desc='') => setItems(p=>[...p,{id:'i'+Date.now(),category:cat,description:desc,spec:'1식',cost:0}]);
  const updItem   = (idx,f,v)     => setItems(p=>p.map((it,i)=>i===idx?{...it,[f]:f==='cost'?(+v||0):v}:it));
  const delItem   = idx           => setItems(p=>p.filter((_,i)=>i!==idx));
  const addMember = ()            => setMpMembers(p=>[...p,{exp:'',role:''}]);
  const updMember = (idx,f,v)     => setMpMembers(p=>p.map((m,i)=>i===idx?{...m,[f]:v}:m));
  const delMember = idx           => setMpMembers(p=>p.filter((_,i)=>i!==idx));

  const validate = () => {
    const e={};
    if(!proj.trim())          e.proj='프로젝트명을 입력해주세요';
    if(!client.company.trim())e.company='업체명을 입력해주세요';
    if(!items.length)         e.items='최소 1개 항목을 추가해주세요';
    setErrs(e); return !Object.keys(e).length;
  };

  const handleSave = () => {
    if(!validate()) return;
    const entry = { at: nowIso(), action: isEdit ? '견적서 수정' : '견적서 생성' };
    onSave({
      id:           initial?.id || genId(),
      status:       initial?.status || 'draft',
      projectTitle: proj, client,
      createdAt:    initial?.createdAt || today(),
      validUntil:   initial?.validUntil || addDays(today(), validDays),
      items, vatExcluded, truncUnit,
      notes:        notes.split('\n').map(s=>s.trim()).filter(Boolean),
      manpower:     { desc:mpDesc, members:mpMembers.filter(m=>m.role.trim()) },
      history:      [...(initial?.history||[]), entry],
      shareToken:   initial?.shareToken || null,
    });
  };

  const total = calcTotal(items);

  return (
    <div style={{maxWidth:960,margin:'0 auto'}}>
      {/* 스텝 탭 */}
      <div style={{display:'flex',gap:4,background:'#fff',borderRadius:8,padding:6,marginBottom:18,border:'1px solid #e8e8e8'}}>
        {[{n:1,l:'① 프로젝트 정보'},{n:2,l:'② 견적 항목'},{n:3,l:'③ 비고 / 확인'}].map(s=>(
          <button key={s.n} onClick={()=>setStep(s.n)}
            style={{flex:1,padding:'9px',border:'none',borderRadius:6,background:step===s.n?'#111':'transparent',color:step===s.n?'#fff':'#aaa',fontWeight:step===s.n?600:400,fontSize:13,transition:'all .15s'}}>
            {s.l}
          </button>
        ))}
      </div>

      {/* STEP 1 */}
      {step===1&&(
        <div style={{background:'#fff',borderRadius:8,padding:26,border:'1px solid #e8e8e8'}}>
          <h3 style={{fontSize:14,fontWeight:600,marginBottom:20,color:'#111'}}>프로젝트 및 고객 정보</h3>
          <div style={{marginBottom:18}}>
            <InpField lbl="프로젝트명" val={proj} onChange={setProj} ph="프로젝트명" err={errs.proj} required/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:22}}>
            <InpField lbl="업체명 (수신처)" val={client.company} onChange={v=>setClient(p=>({...p,company:v}))} ph="(주)회사명" err={errs.company} required/>
            <InpField lbl="담당자"          val={client.contact} onChange={v=>setClient(p=>({...p,contact:v}))} ph="홍길동"/>
            <InpField lbl="이메일"          val={client.email}   onChange={v=>setClient(p=>({...p,email:v}))}   ph="email@company.com"/>
            <InpField lbl="연락처"          val={client.phone}   onChange={v=>setClient(p=>({...p,phone:v}))}   ph="010-0000-0000"/>
          </div>
          <div>
            <label style={{display:'block',fontSize:11,fontWeight:600,color:'#666',marginBottom:8}}>견적 유효기간</label>
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              {[7,14,15,30].map(d=>(
                <button key={d} onClick={()=>setValidDays(d)}
                  style={{padding:'7px 16px',border:`1.5px solid ${validDays===d?'#111':'#e0e0e0'}`,borderRadius:6,background:validDays===d?'#111':'#fff',color:validDays===d?'#fff':'#666',fontSize:13,fontWeight:validDays===d?600:400,transition:'all .15s'}}>
                  {d}일
                </button>
              ))}
              <span style={{fontSize:12,color:'#aaa'}}>→ {fmtDate(addDays(today(),validDays))} 까지</span>
            </div>
          </div>
          <div style={{display:'flex',justifyContent:'flex-end',marginTop:22}}>
            <button onClick={()=>setStep(2)} style={{padding:'10px 26px',background:'#111',color:'#fff',border:'none',borderRadius:6,fontSize:13,fontWeight:600}}>다음 →</button>
          </div>
        </div>
      )}

      {/* STEP 2 */}
      {step===2&&(
        <div className="step2-grid" style={{display:'grid',gridTemplateColumns:'220px 1fr',gap:16}}>
          <div className="catalog-panel" style={{background:'#fff',borderRadius:8,padding:'16px',border:'1px solid #e8e8e8',maxHeight:'72vh',overflowY:'auto'}}>
            <div style={{fontSize:12,fontWeight:600,color:'#333',marginBottom:12}}>항목 추가</div>
            {CATALOG.map(c=>(
              <div key={c.category} style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:600,color:'#111',marginBottom:6,padding:'4px 0',borderBottom:'1px solid #f0f0f0'}}>{c.category}</div>
                {c.items.map(desc=>(
                  <button key={desc} onClick={()=>addItem(c.category,desc)}
                    style={{display:'block',width:'100%',padding:'5px 8px',textAlign:'left',border:'none',background:'none',fontSize:11,color:'#666',borderRadius:4,marginBottom:1,lineHeight:1.5,cursor:'pointer'}}
                    onMouseEnter={e=>e.target.style.background='#f5f5f5'}
                    onMouseLeave={e=>e.target.style.background='none'}>
                    + {desc}
                  </button>
                ))}
                <button onClick={()=>addItem(c.category)}
                  style={{display:'block',width:'100%',padding:'4px 8px',textAlign:'left',border:'1px dashed #e0e0e0',background:'none',fontSize:11,color:'#bbb',borderRadius:4,cursor:'pointer',marginTop:2}}>
                  + 직접 입력...
                </button>
              </div>
            ))}
          </div>

          <div className="items-panel" style={{background:'#fff',borderRadius:8,padding:'18px',border:'1px solid #e8e8e8',display:'flex',flexDirection:'column',maxHeight:'72vh'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
              <div style={{fontSize:13,fontWeight:600,color:'#111'}}>견적 항목 <span style={{color:'#aaa',fontWeight:400}}>({items.length}개)</span></div>
              <label style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'#888',cursor:'pointer'}}>
                <input type="checkbox" checked={vatExcluded} onChange={e=>setVat(e.target.checked)}/>
                부가세 별도
              </label>
            </div>
            {errs.items&&<div style={{fontSize:11,color:'#e53e3e',marginBottom:6}}>{errs.items}</div>}
            <div className="items-scroll" style={{flex:1,overflowY:'auto',marginBottom:12}}>
              {!items.length&&<div style={{padding:'30px 0',textAlign:'center',color:'#ccc',fontSize:12}}>왼쪽에서 항목을 추가하세요</div>}
              {items.map((it,idx)=>(
                <div key={it.id} style={{border:'1px solid #f0f0f0',borderRadius:6,padding:'12px',marginBottom:8}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                    <span style={{fontSize:11,background:'#f0f0f0',color:'#555',borderRadius:3,padding:'2px 8px',fontWeight:600}}>{it.category}</span>
                    <button onClick={()=>delItem(idx)} style={{border:'none',background:'none',color:'#ddd',fontSize:14,cursor:'pointer',lineHeight:1}}
                      onMouseEnter={e=>e.target.style.color='#e53e3e'}
                      onMouseLeave={e=>e.target.style.color='#ddd'}>✕</button>
                  </div>
                  <div style={{marginBottom:6}}>
                    <label style={{fontSize:10,color:'#bbb',display:'block',marginBottom:3}}>세부 내용</label>
                    <textarea value={it.description} onChange={e=>updItem(idx,'description',e.target.value)} rows={2}
                      style={{width:'100%',padding:'6px 8px',border:'1px solid #e8e8e8',borderRadius:5,fontSize:12,outline:'none',resize:'vertical',lineHeight:1.5}}/>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                    <div>
                      <label style={{fontSize:10,color:'#bbb',display:'block',marginBottom:3}}>규격 / 수량</label>
                      <input value={it.spec} onChange={e=>updItem(idx,'spec',e.target.value)} placeholder="1식"
                        style={{width:'100%',padding:'6px 8px',border:'1px solid #e8e8e8',borderRadius:5,fontSize:12,outline:'none'}}/>
                    </div>
                    <div>
                      <label style={{fontSize:10,color:'#bbb',display:'block',marginBottom:3}}>제작비용 (원)</label>
                      <input type="number" value={it.cost} onChange={e=>updItem(idx,'cost',e.target.value)} min="0" step="100000"
                        style={{width:'100%',padding:'6px 8px',border:'1px solid #e8e8e8',borderRadius:5,fontSize:12,outline:'none'}}/>
                    </div>
                  </div>
                  <div style={{textAlign:'right',marginTop:6,fontSize:13,fontWeight:600,color:'#111'}}>{fmtMoney(it.cost)}원</div>
                </div>
              ))}
            </div>
            <div style={{borderTop:'1px solid #f0f0f0',paddingTop:12}}>
              {/* 절사 선택 */}
              <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:8,flexWrap:'wrap'}}>
                <span style={{fontSize:11,fontWeight:600,color:'#888',flexShrink:0}}>절사:</span>
                {[{v:0,l:'없음'},{v:1000,l:'천원'},{v:10000,l:'만원'},{v:100000,l:'십만원'}].map(opt=>(
                  <button key={opt.v} onClick={()=>setTruncUnit(opt.v)}
                    style={{padding:'4px 11px',border:`1.5px solid ${truncUnit===opt.v?'#111':'#e0e0e0'}`,borderRadius:5,background:truncUnit===opt.v?'#111':'#fff',color:truncUnit===opt.v?'#fff':'#666',fontSize:11,fontWeight:truncUnit===opt.v?600:400,transition:'all .15s',cursor:'pointer'}}>
                    {opt.l}
                  </button>
                ))}
                {truncUnit>0&&<span style={{fontSize:11,color:'#aaa',marginLeft:4}}>→ {fmtMoney(Math.floor(total/truncUnit)*truncUnit)}원</span>}
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:'#111',borderRadius:6}}>
                <span style={{fontSize:13,fontWeight:600,color:'#fff'}}>총 제작비용{vatExcluded&&' (부가세 별도)'}</span>
                <span style={{fontSize:18,fontWeight:600,color:'#fff'}}>{fmtMoney(truncUnit>0?Math.floor(total/truncUnit)*truncUnit:total)}원</span>
              </div>
            </div>
          </div>

          <div style={{gridColumn:'1/-1',display:'flex',justifyContent:'space-between',marginTop:4}}>
            <button onClick={()=>setStep(1)} style={{padding:'10px 22px',background:'#f0f0f0',color:'#555',border:'none',borderRadius:6,fontSize:13,fontWeight:600}}>← 이전</button>
            <button onClick={()=>setStep(3)} style={{padding:'10px 26px',background:'#111',color:'#fff',border:'none',borderRadius:6,fontSize:13,fontWeight:600}}>다음 →</button>
          </div>
        </div>
      )}

      {/* STEP 3 */}
      {step===3&&(
        <div style={{background:'#fff',borderRadius:8,padding:26,border:'1px solid #e8e8e8'}}>
          <h3 style={{fontSize:14,fontWeight:600,marginBottom:20,color:'#111'}}>비고 및 Project Manpower</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:22}}>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:600,color:'#666',marginBottom:6}}>비고 (각 줄 = 별도 항목)</label>
              <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={5}
                placeholder={'쇼핑몰 개발은 영카트 솔루션으로 진행 됩니다.\n유지보수는 건별로 진행을 추천드리며, 월/년간 계약은 별도 협의'}
                style={{width:'100%',padding:'10px 11px',border:'1px solid #e0e0e0',borderRadius:6,fontSize:12,outline:'none',resize:'vertical',lineHeight:1.7}}/>
            </div>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:600,color:'#666',marginBottom:6}}>Project Manpower 설명</label>
              <textarea value={mpDesc} onChange={e=>setMpDesc(e.target.value)} rows={3}
                placeholder="해당 프로젝트는 3명의 디자이너가 참여하며 개발 기간은 1개월 예상됩니다."
                style={{width:'100%',padding:'10px 11px',border:'1px solid #e0e0e0',borderRadius:6,fontSize:12,outline:'none',resize:'vertical',lineHeight:1.7}}/>
              <div style={{marginTop:10}}>
                <div style={{fontSize:11,fontWeight:600,color:'#666',marginBottom:8}}>팀 구성원</div>
                {mpMembers.map((m,i)=>(
                  <div key={i} style={{display:'grid',gridTemplateColumns:'90px 1fr 28px',gap:6,marginBottom:6}}>
                    <input value={m.exp} onChange={e=>updMember(i,'exp',e.target.value)} placeholder="10년차"
                      style={{padding:'6px 8px',border:'1px solid #e0e0e0',borderRadius:5,fontSize:12,outline:'none'}}/>
                    <input value={m.role} onChange={e=>updMember(i,'role',e.target.value)} placeholder="기획 / 진행"
                      style={{padding:'6px 8px',border:'1px solid #e0e0e0',borderRadius:5,fontSize:12,outline:'none'}}/>
                    <button onClick={()=>delMember(i)} style={{border:'none',background:'none',color:'#ccc',fontSize:14,cursor:'pointer'}}
                      onMouseEnter={e=>e.target.style.color='#e53e3e'}
                      onMouseLeave={e=>e.target.style.color='#ccc'}>✕</button>
                  </div>
                ))}
                <button onClick={addMember} style={{width:'100%',padding:'5px',border:'1px dashed #e0e0e0',background:'none',borderRadius:5,fontSize:11,color:'#aaa',cursor:'pointer',marginTop:2}}>+ 구성원 추가</button>
              </div>
            </div>
          </div>
          {/* 요약 */}
          <div style={{background:'#fafafa',borderRadius:8,padding:'16px 18px',marginBottom:22,border:'1px solid #f0f0f0'}}>
            <div style={{fontSize:11,fontWeight:600,color:'#aaa',marginBottom:12}}>최종 요약</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:14,marginBottom:14}}>
              {[{l:'프로젝트명',v:proj||'—'},{l:'업체명',v:client.company||'—'},{l:'항목 수',v:items.length+'개'},{l:'유효기한',v:fmtDate(addDays(today(),validDays))}].map(f=>(
                <div key={f.l}>
                  <div style={{fontSize:10,color:'#bbb',marginBottom:3}}>{f.l}</div>
                  <div style={{fontSize:12,fontWeight:600,color:'#111'}}>{f.v}</div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderTop:'1px dashed #e0e0e0',paddingTop:12}}>
              <span style={{fontSize:13,color:'#888'}}>총 제작비용{vatExcluded&&' (부가세 별도)'}{truncUnit>0&&` [${truncUnit>=100000?'십만원':truncUnit>=10000?'만원':'천원'} 절사]`}</span>
              <span style={{fontSize:22,fontWeight:600,color:'#111'}}>{fmtMoney(truncUnit>0?Math.floor(total/truncUnit)*truncUnit:total)}원</span>
            </div>
          </div>
          <div style={{display:'flex',justifyContent:'space-between'}}>
            <button onClick={()=>setStep(2)} style={{padding:'10px 22px',background:'#f0f0f0',color:'#555',border:'none',borderRadius:6,fontSize:13,fontWeight:600}}>← 이전</button>
            <button onClick={handleSave} style={{padding:'11px 32px',background:'#111',color:'#fff',border:'none',borderRadius:7,fontSize:14,fontWeight:600}}>
              {isEdit?'수정 완료 ✓':'견적서 발행 ✓'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════
   QUOTE DOCUMENT  (재사용 컴포넌트)
══════════════════════════════════════ */
function QuoteDocument({quote, company}) {
  const rawTotal  = calcTotal(quote.items);
  const truncUnit = quote.truncUnit || 0;
  const total     = truncUnit > 0 ? Math.floor(rawTotal / truncUnit) * truncUnit : rawTotal;
  const mp        = quote.manpower;
  return (

/* ══════════════════════════════════════
   SHARE MODAL
══════════════════════════════════════ */
function ShareModal({quote, generateShareLink, onClose}) {
  const [token,      setToken]      = useState(quote.shareToken||null);
  const [generating, setGenerating] = useState(false);
  const [copied,     setCopied]     = useState(false);

  const shareUrl = token
    ? `${window.location.origin}${window.location.pathname}?q=${quote.id}&t=${token}`
    : null;

  const handleGenerate = async () => {
    setGenerating(true);
    const t = await generateShareLink(quote);
    if (t) setToken(t);
    setGenerating(false);
  };

  const handleCopy = () => {
    if (!shareUrl) return;
    navigator.clipboard.writeText(shareUrl).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  return (
    <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,.5)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center'}} onClick={onClose}>
      <div style={{background:'#fff', borderRadius:10, padding:'28px', width:540}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20}}>
          <h3 style={{fontSize:16, fontWeight:600, color:'#111'}}>🔗 견적서 공유</h3>
          <button onClick={onClose} style={{border:'none', background:'none', fontSize:20, color:'#aaa', cursor:'pointer', lineHeight:1}}>✕</button>
        </div>
        <div style={{fontSize:13, color:'#555', marginBottom:16, lineHeight:1.7}}>
          공유 링크를 통해 업체 담당자가 견적서를 <strong style={{fontWeight:600}}>열람만</strong> 할 수 있습니다.<br/>
          수정·편집은 불가능하며, 링크를 모르면 접근할 수 없습니다.
        </div>
        <div style={{background:'#fafafa', borderRadius:8, padding:'14px 16px', marginBottom:18, border:'1px solid #f0f0f0'}}>
          <div style={{fontSize:11, color:'#aaa', marginBottom:4, fontWeight:600}}>견적서</div>
          <div style={{fontSize:13, fontWeight:600, color:'#333'}}>{quote.projectTitle||'—'}</div>
          <div style={{fontSize:12, color:'#888', marginTop:2}}>{quote.client.company} · {quote.id}</div>
        </div>

        {!token ? (
          <button onClick={handleGenerate} disabled={generating}
            style={{width:'100%', padding:'12px', background:'#111', color:'#fff', border:'none', borderRadius:6, fontSize:14, fontWeight:600, cursor:generating?'wait':'pointer'}}>
            {generating ? '링크 생성 중...' : '공유 링크 생성'}
          </button>
        ) : (
          <div>
            <div style={{fontSize:11, fontWeight:600, color:'#666', marginBottom:6}}>공유 링크</div>
            <div style={{display:'flex', gap:8}}>
              <input readOnly value={shareUrl}
                style={{flex:1, padding:'9px 11px', border:'1px solid #e0e0e0', borderRadius:6, fontSize:11, color:'#555', background:'#fafafa', outline:'none'}}/>
              <button onClick={handleCopy}
                style={{padding:'9px 18px', background:copied?'#276749':'#111', color:'#fff', border:'none', borderRadius:6, fontSize:12, fontWeight:600, whiteSpace:'nowrap', transition:'background .2s'}}>
                {copied ? '✓ 복사됨' : '복사'}
              </button>
            </div>
            <div style={{fontSize:11, color:'#aaa', marginTop:8}}>링크를 재생성하면 이전 링크는 무효화됩니다.</div>
            <button onClick={handleGenerate} disabled={generating}
              style={{marginTop:10, width:'100%', padding:'9px', background:'#f5f5f5', color:'#555', border:'none', borderRadius:6, fontSize:12, fontWeight:600, cursor:'pointer'}}>
              {generating ? '재생성 중...' : '🔄 링크 재생성'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

          <div>
            <div style={{marginBottom:24}}>
              <div style={{fontSize:12,fontWeight:600,color:'#333',marginBottom:10}}>팀원 목록</div>
              {members.length===0&&<div style={{fontSize:12,color:'#ccc',padding:'12px 0'}}>팀원이 없습니다</div>}
              {members.map(m=>(
                <div key={m.uid} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:m.uid===currentUser?.uid?'#f9f9f9':'#fff',borderRadius:6,marginBottom:6,border:'1px solid #f0f0f0'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#111',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.name||m.email}</div>
                    <div style={{fontSize:11,color:'#aaa'}}>{m.email}</div>
                  </div>
                  {m.uid===currentUser?.uid?(
                    <span style={{fontSize:11,background:'#111',color:'#fff',borderRadius:4,padding:'2px 8px',fontWeight:600,flexShrink:0}}>나</span>
                  ):(
                    <select value={m.role} onChange={e=>changeRole(m.uid,e.target.value)}
                      style={{padding:'5px 8px',border:'1px solid #e0e0e0',borderRadius:5,fontSize:12,background:'#fff',outline:'none',fontFamily:'inherit',cursor:'pointer',flexShrink:0}}>
                      {Object.entries(ROLE_LABEL).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                    </select>
                  )}
                </div>
              ))}
            </div>
            <div style={{borderTop:'1px solid #f0f0f0',paddingTop:20}}>
              <div style={{fontSize:12,fontWeight:600,color:'#333',marginBottom:12}}>팀원 초대</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
                <div>
                  <label style={{display:'block',fontSize:11,fontWeight:600,color:'#666',marginBottom:4}}>이름 (선택)</label>
                  <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="홍길동"
                    style={{width:'100%',padding:'8px 10px',border:'1px solid #e0e0e0',borderRadius:6,fontSize:13,outline:'none'}}
                    onFocus={e=>e.target.style.borderColor='#111'} onBlur={e=>e.target.style.borderColor='#e0e0e0'}/>
                </div>
                <div>
                  <label style={{display:'block',fontSize:11,fontWeight:600,color:'#666',marginBottom:4}}>권한</label>
                  <select value={newRole} onChange={e=>setNewRole(e.target.value)}
                    style={{width:'100%',padding:'8px 10px',border:'1px solid #e0e0e0',borderRadius:6,fontSize:13,background:'#fff',outline:'none',fontFamily:'inherit'}}>
                    <option value="admin">관리자</option><option value="editor">편집자</option><option value="viewer">열람자</option>
                  </select>
                </div>
                <div>
                  <label style={{display:'block',fontSize:11,fontWeight:600,color:'#666',marginBottom:4}}>이메일 *</label>
                  <input type="email" value={newEmail} onChange={e=>setNewEmail(e.target.value)} placeholder="team@dawonstudio.com"
                    style={{width:'100%',padding:'8px 10px',border:'1px solid #e0e0e0',borderRadius:6,fontSize:13,outline:'none'}}
                    onFocus={e=>e.target.style.borderColor='#111'} onBlur={e=>e.target.style.borderColor='#e0e0e0'}/>
                </div>
                <div>
                  <label style={{display:'block',fontSize:11,fontWeight:600,color:'#666',marginBottom:4}}>초기 비밀번호 *</label>
                  <input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="6자 이상"
                    style={{width:'100%',padding:'8px 10px',border:'1px solid #e0e0e0',borderRadius:6,fontSize:13,outline:'none'}}
                    onFocus={e=>e.target.style.borderColor='#111'} onBlur={e=>e.target.style.borderColor='#e0e0e0'}/>
                </div>
              </div>
              {addErr&&<div style={{fontSize:12,color:'#e53e3e',marginBottom:10,background:'#fff5f5',border:'1px solid #fed7d7',borderRadius:6,padding:'8px 12px'}}>{addErr}</div>}
              <button onClick={addMember} disabled={adding}
                style={{width:'100%',padding:'10px',background:'#111',color:'#fff',border:'none',borderRadius:6,fontSize:13,fontWeight:600,cursor:adding?'wait':'pointer'}}>
                {adding?'추가 중...':'+ 팀원 추가'}
              </button>
              <div style={{fontSize:11,color:'#aaa',marginTop:8,lineHeight:1.6}}>
                * 추가된 팀원은 해당 이메일과 비밀번호로 로그인할 수 있습니다.
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
